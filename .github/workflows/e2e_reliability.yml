name: E2E Reliability Baseline

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-reliability:
    name: E2E Reliability (${{ matrix.lane }} #${{ matrix.iteration }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: stable
            iteration: 1
          - lane: stable
            iteration: 2
          - lane: stable
            iteration: 3

    steps:
      - uses: actions/checkout@v4
        if: ${{ env.ACT != 'true' || (matrix.lane == 'stable' && matrix.iteration == 1) }}

      - uses: subosito/flutter-action@v2
        if: ${{ env.ACT != 'true' || (matrix.lane == 'stable' && matrix.iteration == 1) }}
        with:
          channel: stable
          architecture: x64
          cache: ${{ env.ACT != 'true' }}

      - name: Install dependencies
        if: ${{ env.ACT != 'true' || (matrix.lane == 'stable' && matrix.iteration == 1) }}
        run: flutter pub get

      - name: Execute stable E2E suite (required)
        if: ${{ matrix.lane == 'stable' && (env.ACT != 'true' || matrix.iteration == 1) }}
        shell: bash
        run: |
          set -euo pipefail

          run="${{ matrix.iteration }}"
          log_dir="coverage/reliability/stable/run_${run}"
          mkdir -p "${log_dir}"

          echo "=== Stable E2E run ${run}/3 ===" | tee "${log_dir}/run_header.log"

          dart run grinder full-coverage --path="" --type=e2e \
            2>&1 | tee "${log_dir}/prepare.log"

          dart run grinder test --coverage --path=test/e2e \
            2>&1 | tee "${log_dir}/run.log"

          dart run test_cov_console --file="./coverage/lcov.info" --total \
            | tr -d '[:space:]' \
            | tee "${log_dir}/test_total.log"


      - name: Upload reliability logs
        if: ${{ always() && env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reliability-logs-${{ matrix.lane }}-run-${{ matrix.iteration }}
          path: coverage/reliability/${{ matrix.lane }}/run_${{ matrix.iteration }}
          if-no-files-found: warn

      - name: Notify via ntfy
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            title="E2E ${{ matrix.lane }} #${{ matrix.iteration }} passed"
            tags="white_check_mark"
            priority="default"
          else
            title="E2E ${{ matrix.lane }} #${{ matrix.iteration }} failed"
            tags="x"
            priority="high"
          fi
          curl -sf -u "${{ secrets.NTFY_USER }}:${{ secrets.NTFY_PASS }}" \
            -H "Title: ${title}" \
            -H "Tags: ${tags}" \
            -H "Priority: ${priority}" \
            -d "Job: ${{ matrix.lane }} #${{ matrix.iteration }} - ${{ job.status }}" \
            "${{ secrets.NTFY_URL }}" || echo "ntfy notification skipped (no credentials)"
